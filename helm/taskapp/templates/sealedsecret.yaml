{{- if and .Values.sealedSecrets .Values.sealedSecrets.enabled }}
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: {{ .Chart.Name }}-secrets
  namespace: {{ .Values.namespace }}
  annotations:
    sealedsecrets.bitnami.com/managed: "true"
spec:
  encryptedData:
    POSTGRES_PASSWORD: {{ .Values.sealedSecrets.encrypted.postgresPassword }}
    SECRET_KEY: {{ .Values.sealedSecrets.encrypted.secretKey }}
  template:
    metadata:
      name: {{ .Chart.Name }}-secrets
      namespace: {{ .Values.namespace }}
    type: Opaque
{{- end }}
