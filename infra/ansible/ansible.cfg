[defaults]
forks = 5
host_key_checking = False
inventory = inventory/dev/hosts.ini
roles_path = roles
retry_files_enabled = False
gathering = smart
fact_caching = jsonfile
fact_caching_connection = /tmp/ansible_cache
fact_caching_timeout = 3600
timeout = 60

[ssh_connection]
pipelining = True
control_path = /tmp/ansible-%%h-%%p-%%r
retries = 3
# ServerAliveInterval keeps the connection from dropping during heavy CPU tasks
ssh_args = -o ControlMaster=auto -o ControlPersist=600s -o ServerAliveInterval=15 -o ServerAliveCountMax=3
