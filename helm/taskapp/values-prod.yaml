# Production values
namespace: taskapp

replicaCount:
  backend: 3
  frontend: 3

postgresql:
  persistence:
    size: 20Gi
  resources:
    requests:
      memory: "512Mi"
      cpu: "500m"
    limits:
      memory: "1Gi"
      cpu: "1"

backend:
  resources:
    requests:
      memory: "512Mi"
      cpu: "500m"
    limits:
      memory: "1Gi"
      cpu: "1"

frontend:
  resources:
    requests:
      memory: "256Mi"
      cpu: "200m"
    limits:
      memory: "512Mi"
      cpu: "400m"

# Secrets must be set via external secrets manager in production
secrets:
  postgresPassword: ""  # Must be from external secret
  secretKey: ""         # Must be from external secret

externalAccess:
  host: taskapp.prod.local
  port: 80
