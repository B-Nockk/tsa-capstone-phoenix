---
- name: Get control plane private IP
  set_fact:
    control_plane_ip: "{{ ansible_default_ipv4.address }}"

- name: Create k3s install directory
  file:
    path: "{{ k3s_install_dir }}"
    state: directory
    mode: 0755

- name: Install k3s server
  shell: |
    curl -sfL https://get.k3s.io | \
    INSTALL_K3S_VERSION="{{ k3s_version }}" \
    K3S_TOKEN="{{ hostvars['localhost']['k3s_token'] | default('') }}" \
    INSTALL_K3S_EXEC="{{ k3s_server_args }}" \
    sh -
  args:
    creates: /usr/local/bin/kubectl

- name: Wait for k3s to be ready
  shell: kubectl get nodes
  register: result
  until: result.rc == 0
  retries: 30
  delay: 5

# --- NEW: CALICO CNI INSTALLATION ---
- name: Install Calico Tigera Operator
  shell: kubectl create -f https://raw.githubusercontent.com/projectcalico/calico/{{ calico_version }}/manifests/tigera-operator.yaml
  register: calico_operator
  failed_when: calico_operator.rc != 0 and 'AlreadyExists' not in calico_operator.stderr
  changed_when: "'created' in calico_operator.stdout"

- name: Wait for Tigera Operator to be ready
  pause:
    seconds: 10

- name: Install Calico Custom Resources
  shell: kubectl create -f https://raw.githubusercontent.com/projectcalico/calico/{{ calico_version }}/manifests/custom-resources.yaml
  register: calico_cr
  failed_when: calico_cr.rc != 0 and 'AlreadyExists' not in calico_cr.stderr
  changed_when: "'created' in calico_cr.stdout"
# ------------------------------------

- name: Get node token for workers
  shell: cat /var/lib/rancher/k3s/server/node-token
  register: node_token
  changed_when: false

- name: Display node token
  debug:
    msg: "Node token: {{ node_token.stdout }}"

- name: Generate kubeconfig for local use
  shell: |
    cp /etc/rancher/k3s/k3s.yaml /tmp/k3s.yaml
    sed -i 's/127.0.0.1/{{ control_plane_ip }}/g' /tmp/k3s.yaml
    chmod 644 /tmp/k3s.yaml

- name: Fetch kubeconfig to local
  fetch:
    src: /tmp/k3s.yaml
    dest: ./kubeconfig-{{ ansible_env.ENVIRONMENT | default('dev') }}.yaml
    flat: yes
    mode: 0644

- name: Add kubectl alias for ubuntu user
  lineinfile:
    path: /home/ubuntu/.bashrc
    line: "alias k='kubectl'"
    create: yes
    owner: ubuntu
    group: ubuntu
