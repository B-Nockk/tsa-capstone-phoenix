{{- if and .Values.secrets .Values.secrets.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: taskapp-secrets
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ required "POSTGRES_PASSWORD must be set" .Values.secrets.postgresPassword | quote }}
  SECRET_KEY: {{ required "SECRET_KEY must be set" .Values.secrets.secretKey | quote }}
{{- if .Values.secrets.grafanaPassword }}
  GRAFANA_PASSWORD: {{ .Values.secrets.grafanaPassword | quote }}
{{- end }}
{{- end }}
