# Default values for TaskApp
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Image settings
images:
  backend:
    repository: ghcr.io/ts-a-devops/taskapp-backend
    tag: "5d6b8fc"
    pullPolicy: IfNotPresent
  frontend:
    repository: ghcr.io/ts-a-devops/taskapp-frontend
    tag: "26da2b0"
    pullPolicy: IfNotPresent
  postgres:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent

# Replica counts
replicaCount:
  backend: 2
  frontend: 2

# PostgreSQL configuration
postgresql:
  enabled: true
  auth:
    username: taskapp_user
    password: ""  # Must be set via --set or values-dev.yaml
    database: taskapp
  persistence:
    enabled: true
    size: 10Gi
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"

# Backend configuration
backend:
  env:
    FLASK_ENV: production
    CORS_ORIGINS: "http://localhost:8080,http://localhost:3000"
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  service:
    port: 5000
    targetPort: 5000

# Frontend configuration
frontend:
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "200m"
  service:
    port: 8000
    targetPort: 8000

# Ingress configuration
ingress:
  enabled: true
  className: "nginx"
  annotations:
    kubernetes.io/ingress.class: nginx
  hosts:
    - host: taskapp.local
      paths:
        - path: /api
          pathType: Prefix
          backend:
            service:
              name: backend
              port:
                number: 5000
        - path: /
          pathType: Prefix
          backend:
            service:
              name: frontend
              port:
                number: 80

# Secrets (values are set via --set or external secrets)
secrets:
  enabled: false
  postgresPassword: ""  # Must be set
  secretKey: ""         # Must be set

sealedSecrets:
  enabled: false

# Namespace
namespace: taskapp

externalAccess:
  enabled: true
  host: taskapp.local
  port: 8080

# Resource limits (global defaults)
global:
  namespace: taskapp

# NetworkPolicy configuration
networkPolicy:
  enabled: true
  # Default deny all ingress (enabled by default)
  defaultDeny: true
  # Allow ingress from frontend to backend
  allowFrontendToBackend: true
  # Allow ingress from ingress controller to frontend
  allowIngressToFrontend: true
  # Allow ingress from backend to postgres
  allowBackendToPostgres: true

# PodDisruptionBudget configuration
podDisruptionBudget:
  enabled: true
  backend:
    minAvailable: 1
  frontend:
    minAvailable: 1
  postgres:
    minAvailable: 1

# HPA configuration
hpa:
  enabled: true
  backend:
    minReplicas: 2
    maxReplicas: 5
    cpu:
      targetAverageUtilization: 70
    memory:
      targetAverageUtilization: 80
  frontend:
    minReplicas: 2
    maxReplicas: 5
    cpu:
      targetAverageUtilization: 70
    memory:
      targetAverageUtilization: 80

backup:
  bucketName: ""   # populated by CI from `terraform output db_backup_bucket_name`

migrations:
  enabled: true
