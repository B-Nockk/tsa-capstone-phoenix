# helm/taskapp/values-prod.yaml
# Production values
namespace: taskapp-prod

replicaCount:
  backend: 3
  frontend: 3

postgresql:
  persistence:
    size: 20Gi
  resources:
    requests:
      memory: "512Mi"
      cpu: "500m"
    limits:
      memory: "1Gi"
      cpu: "1"

backend:
  resources:
    requests:
      memory: "512Mi"
      cpu: "500m"
    limits:
      memory: "1Gi"
      cpu: "1"

frontend:
  resources:
    requests:
      memory: "256Mi"
      cpu: "200m"
    limits:
      memory: "512Mi"
      cpu: "400m"

# Secrets must be set via external secrets manager in production
secrets:
  postgresPassword: ""  # Must be from external secret
  secretKey: ""         # Must be from external secret

externalAccess:
  host: taskapp.prod.local
  port: 80

networkPolicy:
  enabled: true

# helm/taskapp/values-prod.yaml
ingress:
  enabled: true
  className: nginx
  hosts:
    - host: taskapp.example.com  # Will be overridden via --set
      paths:
        - path: /api
          pathType: Prefix
          backend:
            service:
              name: backend
              port:
                number: 5000
        - path: /
          pathType: Prefix
          backend:
            service:
              name: frontend
              port:
                number: 80
  tls:
    enabled: true
    issuer: letsencrypt-prod
