---
- name: Wait for cloud-init to complete
  command: cloud-init status --wait
  changed_when: false

- name: Stop and disable automatic apt timers to prevent lock contention
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
    enabled: false
  loop:
    - apt-daily.timer
    - apt-daily-upgrade.timer
    - apt-daily.service
    - apt-daily-upgrade.service
    - unattended-upgrades.service
  failed_when: false

- name: Wait for any in-progress apt lock to clear
  ansible.builtin.shell: |
    while fuser /var/lib/dpkg/lock-frontend /var/lib/apt/lists/lock /var/cache/apt/archives/lock >/dev/null 2>&1; do
      sleep 5
    done
  changed_when: false

- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600
    lock_timeout: 500
  throttle: 1 # Forces Ansible to update packages one server at a time

- name: Install base packages
  apt:
    name: "{{ packages_base }}"
    state: present
    lock_timeout: 500
  throttle: 1 # Keeps memory spikes contained

# TODO:: needs an IAM instance profile with AmazonSSMManagedInstanceCore attached in the compute module
#   - worth adding regardless, it's the standard "I locked myself out" escape hatch for EC2).
