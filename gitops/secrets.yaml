{{- if and .Values.secrets .Values.secrets.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Chart.Name }}-secrets
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ required "secrets.postgresPassword must be set" .Values.secrets.postgresPassword | quote }}
  SECRET_KEY: {{ required "secrets.secretKey must be set" .Values.secrets.secretKey | quote }}
{{- if .Values.secrets.grafanaPassword }}
  GRAFANA_PASSWORD: {{ .Values.secrets.grafanaPassword | quote }}
{{- end }}
{{- end }}
