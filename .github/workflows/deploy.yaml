  name: Deploy TaskApp (GitOps)
  on:
    workflow_dispatch:
      inputs:
        timeout_minutes:
          description: 'Pipeline timeout limit (minutes)'
          required: true
          default: '45'
          type: string
        environment:
          description: 'Environment to deploy to'
          required: true
          default: 'dev'
          type: choice
          options: [dev, prod]
        run_terraform:
          description: '1. Provision Infrastructure (Terraform)?'
          required: true
          default: true
          type: boolean
        run_ansible:
          description: '2. Configure Cluster (Ansible)?'
          required: true
          default: true
          type: boolean
        use_duckdns:
          description: '3. Update DuckDNS with new IP?'
          required: true
          default: false
          type: boolean
        deploy_argo:
          description: '4. Deploy Application (ArgoCD)?'
          required: true
          default: true
          type: boolean
        install_docker:
                description: 'Install Docker alongside K3s'
                required: true
                type: boolean
                default: false

  env:
    ENV: ${{ github.event.inputs.environment || 'dev' }}
    CLOUD: aws
    NAMESPACE: taskapp-${{ github.event.inputs.environment || 'dev' }}

  jobs:
    deploy:
      runs-on: ubuntu-latest
      timeout-minutes: ${{ fromJSON(github.event.inputs.timeout_minutes || '45') }}
      environment: ${{ github.event.inputs.environment || 'dev' }}
      permissions:
        contents: write


      steps:
        - name: Checkout Code
          uses: actions/checkout@v4

        - name: Load GitHub Variables into Environment
          env:
            GH_VARS: ${{ toJSON(vars) }}
          run: |
            echo "🔄 Dynamically loading repository variables..."
            # Intercept TF_VARs and force the variable name back to lowercase for Terraform
            # echo "$GH_VARS" | jq -r 'to_entries[] | if (.key | startswith("TF_VAR_")) then "TF_VAR_" + (.key[7:] | ascii_downcase) + "<<__EOV__\n\(.value)\n__EOV__" else "\(.key)<<__EOV__\n\(.value)\n__EOV__" end' >> "$GITHUB_ENV"
            echo "$GH_VARS" | jq -r 'to_entries[] | select(.key != "NAMESPACE") | if (.key | startswith("TF_VAR_")) then "TF_VAR_" + (.key[7:] | ascii_downcase) + "<<__EOV__\n\(.value)\n__EOV__" else "\(.key)<<__EOV__\n\(.value)\n__EOV__" end' >> "$GITHUB_ENV"
            echo "✅ Variables loaded!"

        - name: Setup CI Dependencies
          run: make setup-ci-deps

        - name: Debug credential lengths
          run: |
            echo "AKID length: ${#AWS_ACCESS_KEY_ID}"
            echo "SECRET length: ${#AWS_SECRET_ACCESS_KEY}"
          env:
            AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

        - name: Configure AWS Credentials
          uses: aws-actions/configure-aws-credentials@v4
          with:
            aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws-region: ${{ env.TF_VAR_aws_region }}

        # - name: Debug SSH Key Format
        #   run: |
        #     KEY_LINES=$(echo "${{ secrets.SSH_PRIVATE_KEY }}" | wc -l)
        #     echo "The private key has $KEY_LINES lines."
        #     if [ "$KEY_LINES" -lt 5 ]; then
        #       echo "❌ ERROR: Private key is corrupted or missing line breaks!"
        #       exit 1
        #     fi

        - name: Setup SSH Key for CI
          run: |
            mkdir -p ~/.ssh
            cat << 'EOF' > ~/.ssh/id_ed25519
            ${{ secrets.SSH_PRIVATE_KEY }}
            EOF
            chmod 600 ~/.ssh/id_ed25519

        - name: Verify SSH Key Integrity
          run: |
            echo "🔑 Deriving public key from what was written to disk..."
            ssh-keygen -y -f ~/.ssh/id_ed25519 > /tmp/derived.pub
            ssh-keygen -lf /tmp/derived.pub

            echo "🔑 Fingerprint of the SSH_PUBLIC_KEY secret..."
            echo "${{ secrets.SSH_PUBLIC_KEY }}" > /tmp/expected.pub
            ssh-keygen -lf /tmp/expected.pub

        # - name: Debug SSH negotiation
        #   run: |
        #     ssh -vvv -o StrictHostKeyChecking=no -o BatchMode=yes \
        #       -i ~/.ssh/id_ed25519 ubuntu@51.20.66.3 exit 2>&1 | \
        #       grep -E "Offering|Authentications|Trying|debug1: Next|publickey"

        - name: Verify SSH secrets are set
          run: |
            if [ -z "${{ secrets.SSH_PUBLIC_KEY }}" ]; then
              echo "❌ SSH_PUBLIC_KEY secret is empty — refusing to let Terraform fall back to key generation"
              exit 1
            fi

        - name: Regenerate inventory from existing state
          if: github.event.inputs.run_terraform == 'false'
          env:
            TF_VAR_ssh_public_key_content: ${{ secrets.SSH_PUBLIC_KEY }}
            TF_VAR_ssh_private_key_path: /home/runner/.ssh/id_ed25519
          run: |
            make tf-init ENV=${{ env.ENV }}
            cd infra/terraform && terraform apply -auto-approve -target=local_file.ansible_inventory

        - name: Get CI runner public IP
          id: runner_ip
          run: |
            RUNNER_IP="$(curl -s https://checkip.amazonaws.com)/32"
            if [ -z "$RUNNER_IP" ] || [ "$RUNNER_IP" = "/32" ]; then
              echo "❌ Failed to determine runner IP"; exit 1
            fi
            echo "ip=$RUNNER_IP" >> "$GITHUB_OUTPUT"

        - name: Build allowed SSH IPs list
          id: ssh_ips
          run: |
            RUNNER_IP="$(curl -s https://checkip.amazonaws.com)/32"
            if [ -z "$RUNNER_IP" ] || [ "$RUNNER_IP" = "/32" ]; then
              echo "❌ Failed to determine runner IP"; exit 1
            fi
            ADMIN_IP="${{ vars.ADMIN_SSH_IP }}"
            if [ -n "$ADMIN_IP" ]; then
              echo "list=[\"$RUNNER_IP\", \"$ADMIN_IP\"]" >> "$GITHUB_OUTPUT"
            else
              echo "list=[\"$RUNNER_IP\"]" >> "$GITHUB_OUTPUT"
            fi

        - name: Build allowed API IPs list
          id: api_ips
          run: |
            RUNNER_IP="$(curl -s https://checkip.amazonaws.com)/32"
            if [ -z "$RUNNER_IP" ] || [ "$RUNNER_IP" = "/32" ]; then
              echo "❌ Failed to determine runner IP"; exit 1
            fi

            ADMIN_IP="${{ vars.ADMIN_SSH_IP }}"

            # Build the lists for TF and Ansible
            if [ -n "$ADMIN_IP" ]; then
              TF_LIST="[\"$RUNNER_IP\", \"$ADMIN_IP\"]"
              ANS_LIST="$RUNNER_IP,$ADMIN_IP"
            else
              TF_LIST="[\"$RUNNER_IP\"]"
              ANS_LIST="$RUNNER_IP"
            fi

            # Export them dynamically
            echo "TF_VAR_api_allowed_ips=$TF_LIST" >> $GITHUB_ENV
            echo "API_IPS=$ANS_LIST" >> $GITHUB_ENV

        # --- STAGE 1: TERRAFORM ---
        - name: Provision Infrastructure
          if: github.event.inputs.run_terraform != 'false'
          run: |
            make tf-backend-setup ENV=${{ env.ENV }}
            ALLOWED_IPS=$(echo "$TF_VAR_allowed_ssh_ips" | jq -c '. + ["${{ steps.runner_ip.outputs.ip }}"]')
            echo "Allowed SSH IPs: $ALLOWED_IPS"
            make tf-apply ENV=${{ env.ENV }} \
              TF_VAR_ssh_public_key_content="${{ secrets.SSH_PUBLIC_KEY }}" \
              TF_VAR_ssh_private_key_path="/home/runner/.ssh/id_ed25519" \
              TF_VAR_allowed_ssh_ips="$ALLOWED_IPS"

        - name: Debug SSH negotiation
          if: github.event.inputs.run_terraform != 'false'
          run: |
            IP=$(cd infra/terraform && terraform output -json control_plane_public_ips | jq -r '.[0]')
            ssh -vvv -o StrictHostKeyChecking=no -o BatchMode=yes \
              -i ~/.ssh/id_ed25519 ubuntu@"$IP" exit 2>&1 | \
              grep -E "Offering|Authentications|Trying|debug1: Next|publickey" || true

        # --- STAGE 2: ANSIBLE & KUBECONFIG ---
        # - name: Configure Cluster
        #   if: github.event.inputs.run_ansible != 'false'
        #   run: |
        #     make ans-run ENV=${{ env.ENV }} INSTALL_DOCKER=${{ github.event.inputs.install_docker }}
        #     make tf-output > /dev/null # Ensure outputs are loaded
        #     # make k8s-context-cloud ENV=${{ env.ENV }}
        #     mkdir -p ~/.kube
        #     cp infra/ansible/kubeconfig-${{ env.ENV }}.yaml ~/.kube/config
        #     kubectl get nodes

        # - name: Configure Cluster
        #   if: github.event.inputs.run_ansible != 'false'
        #   env:
        #     # THIS IS THE SINGLE SOURCE OF TRUTH
        #     KUBE_PATH: ${{ github.workspace }}/infra/ansible/kubeconfig-${{ env.ENV }}.yaml
        #   run: |
        #     make ans-run ENV=${{ env.ENV }} INSTALL_DOCKER=${{ github.event.inputs.install_docker }} KUBECONFIG_DEST=${{ env.KUBE_PATH }}
        #     make tf-output > /dev/null
        #     mkdir -p ~/.kube

        #     # Use the exact same variable for the copy!
        #     cp ${{ env.KUBE_PATH }} ~/.kube/config

        #     # Prove the cluster is alive
        #     kubectl get nodes

        - name: Configure Cluster
          if: github.event.inputs.run_ansible != 'false'
          run: |
            # Make knows exactly where to put the file based on KUBECONFIG_PATH
            make ans-run ENV=${{ env.ENV }} INSTALL_DOCKER=${{ github.event.inputs.install_docker }}
            make tf-output > /dev/null

            # Make automatically uses KUBECONFIG for kubectl
            make k8s-get-nodes ENV=${{ env.ENV }}

        # --- STAGE 3: PLATFORM & DOMAIN ---
        # - name: Setup Platform (Ingress, Cert-Manager)
        #   if: github.event.inputs.deploy_argo != 'false'
        #   run: |
        #     make sys-setup ARGOCD_RESET_PASSWORD=false ENV=${{ env.ENV }} CLOUD=aws

        - name: Setup Platform (Ingress, Cert-Manager, Sealed Secrets)
          if: github.event.inputs.deploy_argo != 'false'
          run: |
            # Helm automatically inherits KUBECONFIG from the Makefile!
            make sys-setup ENV=${{ env.ENV }} CLOUD=aws ARGOCD_RESET_PASSWORD=false

        - name: Manage Domain (DuckDNS)
          if: github.event.inputs.use_duckdns == 'true'
          env:
            DUCKDNS_TOKEN: ${{ secrets.DUCKDNS_TOKEN }}
            DUCKDNS_DOMAIN: ${{ vars.DUCKDNS_DOMAIN }}
          run: |
            if [ -n "$DUCKDNS_TOKEN" ] && [ -n "$DUCKDNS_DOMAIN" ]; then
              echo "Fetching Control Plane IP from Terraform state..."
              # Initialize Terraform state quietly to access outputs
              make tf-init ENV=${{ env.ENV }} > /dev/null
              IP=$(cd infra/terraform && terraform output -json control_plane_public_ips | jq -r '.[0]')

              if [ -z "$IP" ] || [ "$IP" = "null" ]; then
                echo "Error: Could not retrieve IP from Terraform state."
                exit 1
              fi

              echo "Updating DuckDNS $DUCKDNS_DOMAIN to $IP"
              curl -s "https://www.duckdns.org/update?domains=${DUCKDNS_DOMAIN}&token=${DUCKDNS_TOKEN}&ip=${IP}"
              echo "HOST=${DUCKDNS_DOMAIN}.duckdns.org" >> "$GITHUB_ENV"
            else
              echo "DuckDNS secrets missing. Skipping."
            fi

        # --- STAGE 4: GITOPS DEPLOYMENT ---
        - name: Generate and commit sealed secrets
          if: github.event.inputs.deploy_argo != 'false'
          env:
            POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
            SECRET_KEY: ${{ secrets.SECRET_KEY }}
            GRAFANA_PASSWORD: ${{ secrets.GRAFANA_PASSWORD }}
            AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          run: |
            make sec-generate ENV=${{ env.ENV }} AUTO_INJECT=true

        - name: Deploy via ArgoCD
          if: github.event.inputs.deploy_argo != 'false'
          run: |
            # 1. Determine active TLS Issuer based on environment and variables
            if [ -n "${{ vars.TLS_ISSUER }}" ]; then
              export ACTIVE_ISSUER="${{ vars.TLS_ISSUER }}"
            elif [ "${{ env.ENV }}" != "local" ]; then
              export ACTIVE_ISSUER="letsencrypt-prod"
            else
              export ACTIVE_ISSUER="selfsigned-cluster-issuer"
            fi

            # Inject repo dynamically (with .git appended)
            # sed -i "s|repoURL:.*|repoURL: ${{ github.server_url }}/${{ github.repository }}.git|g" gitops/application.${{ env.ENV }}.yaml
            # sed -i "s|targetRevision:.*|targetRevision: ${{ github.ref_name }}|g" gitops/application.${{ env.ENV }}.yaml

            sed -i "s|repoURL:.*|repoURL: ${{ github.server_url }}/${{ github.repository }}.git|g" gitops/applicationset.yaml
            sed -i "s|targetRevision:.*|targetRevision: ${{ github.ref_name }}|g" gitops/applicationset.yaml

            # 3. Inject Domain and TLS Issuer placeholders
            sed -i "s|INJECT_DOMAIN_NAME|${{ vars.DOMAIN_NAME }}|g" gitops/applicationset.yaml
            sed -i "s|INJECT_TLS_ISSUER|$ACTIVE_ISSUER|g" gitops/applicationset.yaml

            make argo-deploy ENV=${{ env.ENV }} HOST=${{ env.HOST }}

        - name: Run Tests
          if: github.event.inputs.deploy_argo != 'false'
          run: make helm-test-app ENV=${{ env.ENV }}

        - name: Generate Summary
          if: always()
          run: |
            echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| **Environment** | ${{ env.ENV }} |" >> $GITHUB_STEP_SUMMARY
            echo "| **Terraform Executed** | ${{ github.event.inputs.run_terraform || 'true (push)' }} |" >> $GITHUB_STEP_SUMMARY
            echo "| **Ansible Executed** | ${{ github.event.inputs.run_ansible || 'true (push)' }} |" >> $GITHUB_STEP_SUMMARY
            echo "| **DuckDNS Updated** | ${{ github.event.inputs.use_duckdns || 'false (push)' }} |" >> $GITHUB_STEP_SUMMARY
            echo "| **ArgoCD Deployed** | ${{ github.event.inputs.deploy_argo || 'true (push)' }} |" >> $GITHUB_STEP_SUMMARY
