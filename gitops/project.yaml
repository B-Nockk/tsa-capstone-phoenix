apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: taskapp
  namespace: argocd
spec:
  description: TaskApp Project
  sourceRepos:
  - https://github.com/B-Nockk/tsa-capstone-phoenix.git
  destinations:
  - namespace: taskapp-*
    server: https://kubernetes.default.svc
  clusterResourceWhitelist:
  - group: '*'
    kind: '*'
  namespaceResourceWhitelist:
  - group: '*'
    kind: '*'
  roles:
  - name: developer
    policies:
    - p, proj:taskapp:developer, applications, get, taskapp-*, allow