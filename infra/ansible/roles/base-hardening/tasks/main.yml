---
# ==============================================================================
# PRE-FLIGHT & APT LOCK MANAGEMENT
# ==============================================================================
- name: Wait for cloud-init to complete
  ansible.builtin.command: cloud-init status --wait
  changed_when: false

- name: Stop and disable automatic apt timers to prevent lock contention
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
    enabled: false
  loop:
    - apt-daily.timer
    - apt-daily-upgrade.timer
    - apt-daily.service
    - apt-daily-upgrade.service
    - unattended-upgrades.service
  failed_when: false

- name: Wait for any in-progress apt lock to clear
  ansible.builtin.shell: |
    while fuser /var/lib/dpkg/lock-frontend /var/lib/apt/lists/lock /var/cache/apt/archives/lock >/dev/null 2>&1; do
      sleep 5
    done
  changed_when: false

# ==============================================================================
# SYSTEM UPDATES & PACKAGES
# ==============================================================================
# TODO:: update this to have vars for lock_timeout & apt_cache_time to auto skip or pass on a configurable timeout
# - name: Update apt cache
#   ansible.builtin.apt:
#     update_cache: true
#     cache_valid_time: "{{ apt_cache_time | default(86400) }}"
#     lock_timeout: 1200 # Bumped to 20 mins
#   throttle: 1 # Forces Ansible to update packages one server at a time
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 86400
    lock_timeout: 800 # Bumped to 20 mins
  ignore_errors: true
  throttle: 1 # Forces Ansible to update packages one server at a time

- name: Install base packages
  ansible.builtin.apt:
    name: "{{ packages_base }}"
    state: present
    lock_timeout: 500
  throttle: 1 # Keeps memory spikes contained

- name: Set timezone
  timezone:
    name: "{{ timezone }}"

# ==============================================================================
# FIREWALL (UFW)
# ==============================================================================
- name: Configure UFW - allow SSH (CRITICAL to avoid lockouts)
  ufw:
    rule: allow
    name: OpenSSH

- name: Configure UFW - allow HTTP and HTTPS
  ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop:
    - "80"
    - "443"

- name: Configure UFW - allow internal K8s traffic (VPC, Pods, Services)
  ufw:
    rule: allow
    src: "{{ item }}"
  loop:
    - "{{ vpc_cidr }}"
    - "{{ k3s_pod_cidr | default('192.168.0.0/16') }}"
    - "{{ k3s_service_cidr | default('10.43.0.0/16') }}"
  when: item is defined and item != ''

- name: Configure UFW - allow K8s API from allowed IPs
  ufw:
    rule: allow
    port: "6443"
    proto: tcp
    src: "{{ item }}"
  loop: "{{ api_ips.split(',') }}"
  when: api_ips is defined and api_ips | length > 0 and item != ''

- name: Enable UFW
  ufw:
    state: enabled
    policy: deny

- name: Configure UFW - Allow K8s packet forwarding in kernel
  ansible.builtin.lineinfile:
    path: /etc/default/ufw
    regexp: "^DEFAULT_FORWARD_POLICY="
    line: 'DEFAULT_FORWARD_POLICY="ACCEPT"'

- name: Reload UFW to apply forwarding policy
  ansible.builtin.command: ufw reload
  changed_when: false

# ==============================================================================
# SECURITY & HARDENING
# ==============================================================================
- name: Configure fail2ban
  ansible.builtin.copy:
    dest: /etc/fail2ban/jail.local
    content: |
      [DEFAULT]
      bantime = 3600
      findtime = 600
      maxretry = 5

      [sshd]
      enabled = true
      port = ssh
      filter = sshd
      logpath = /var/log/auth.log
    owner: root
    group: root
    mode: "0644"
  notify: restart fail2ban

- name: Ensure fail2ban is running
  ansible.builtin.service:
    name: fail2ban
    state: started
    enabled: true

- name: Configure system limits
  ansible.builtin.copy:
    dest: /etc/security/limits.conf
    content: |
      * soft nofile 65535
      * hard nofile 65535
      * soft nproc 65535
      * hard nproc 65535
    owner: root
    group: root
    mode: "0644"

- name: Disable root SSH login
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^PermitRootLogin"
    line: "PermitRootLogin no"
  notify: restart ssh

- name: Disable password authentication
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^PasswordAuthentication"
    line: "PasswordAuthentication no"
  notify: restart ssh

- name: Enable SSH key authentication
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^PubkeyAuthentication"
    line: "PubkeyAuthentication yes"
  notify: restart ssh

# ==============================================================================
# DOCKER (Optional - Controlled via pipeline feature flag)
# ==============================================================================
- name: Install and configure Docker (Optional)
  when: install_docker | default(false) | bool
  block:
    - name: Install Docker prerequisites
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present

    - name: Create directory for Docker key
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Download Docker GPG key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"

    - name: Add Docker repository
      ansible.builtin.apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    - name: Install Docker
      ansible.builtin.apt:
        name: docker-ce
        state: present
        update_cache: true

    - name: Add ubuntu user to docker group
      ansible.builtin.user:
        name: ubuntu
        groups: docker
        append: true
